<div *ngIf="allBlogs$ | async as blogs; else loading">
  <div *ngIf="blogs.length > 0">
    <div *ngFor="let blog of blogs">
      <app-blogcard [blogEntry]="blog"></app-blogcard>
    </div>
  </div>
  <div *ngIf="blogs.length === 0">No blogs found</div>
</div>

<ng-template #loading>Loading blogs...</ng-template>
